<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Pembimbing - Admin LTQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/panel-admin-pembimbing.css">
    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-iframe');
            window.addEventListener('DOMContentLoaded', () => document.body.classList.add('is-iframe'));
        }
    </script>
</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
            <div class="header-icon">
                <i data-lucide="sliders-horizontal" class="w-10 h-10 text-white"></i>
            </div>
            <div class="flex-1">
                <h1 class="text-4xl font-extrabold tracking-tight text-white">Rekap Kehadiran Pembimbing</h1>
                <p class="text-gray-400 text-lg">Kelola periode, libur, dan lihat rekapitulasi kehadiran harian.</p>
            </div>
        </header>

        <main class="space-y-8">
            <!-- Filter Card -->
            <div class="glass-card p-6">
                <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                    <h2 class="text-2xl font-bold text-white">Filter Periode</h2>
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                        <select id="monthFilter" class="input-glass flex-1 min-w-[150px]"></select>
                        <select id="yearFilter" class="input-glass w-28"></select>
                        <button id="setFilterBtn" type="button" class="premium-btn !w-auto px-8">
                            Terapkan Filter
                        </button>
                    </div>
                </div>
            </div>

            <!-- Management Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Manage Recap Periods -->
                <div class="glass-card p-8">
                    <h2 class="text-2xl font-bold text-white mb-6">Setel Periode Rekap</h2>
                    <form id="addPeriodForm" class="space-y-6">
                        <input type="hidden" id="periodId">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>Tanggal Mulai</label>
                                <input type="date" id="periodStartDate" class="input-glass" required>
                            </div>
                            <div class="form-group">
                                <label>Tanggal Akhir</label>
                                <input type="date" id="periodEndDate" class="input-glass" required>
                            </div>
                        </div>
                        <button type="submit" id="addPeriodBtn" class="premium-btn">
                            <i data-lucide="plus" class="w-5 h-5"></i> Simpan Periode
                        </button>
                    </form>
                    
                    <div class="mt-10 pt-8 border-t border-white/5">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">Periode Tersimpan (Bulan Ini)</h3>
                        <div id="periodsListContainer" class="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                            <p class="text-gray-500 text-center py-4">Memuat periode...</p>
                        </div>
                    </div>
                </div>

                <!-- Manage Holidays -->
                <div class="glass-card p-8">
                    <h2 class="text-2xl font-bold text-white mb-6">Kelola Hari Libur</h2>
                    <div class="space-y-6">
                        <div class="flex flex-wrap items-end gap-4">
                            <div class="form-group flex-1 min-w-[200px]">
                                <label>Tanggal Libur</label>
                                <input type="date" id="newHolidayDate" class="input-glass">
                            </div>
                            <div class="form-group">
                                <label>Sesi Libur</label>
                                <div class="holiday-options">
                                    <label class="holiday-chip">
                                        <input type="checkbox" id="holidayMorning">
                                        <i data-lucide="sun" class="w-4 h-4"></i>
                                        <span>Pagi</span>
                                    </label>
                                    <label class="holiday-chip">
                                        <input type="checkbox" id="holidayAfternoon">
                                        <i data-lucide="moon" class="w-4 h-4"></i>
                                        <span>Sore</span>
                                    </label>
                                </div>
                            </div>
                            <button id="addHolidayBtn" type="button" class="btn-secondary-glass !py-3 mb-0">Tambah</button>
                        </div>

                        <div id="holidaysListContainer" class="space-y-3 max-h-48 overflow-y-auto pr-2 custom-scrollbar bg-slate-950/30 p-4 rounded-xl border border-white/5">
                            <p class="text-gray-500 text-center py-4">Memuat tanggal libur...</p>
                        </div>

                        <button id="saveHolidaysBtn" type="button" class="premium-btn !bg-emerald-600">
                            <i data-lucide="save" class="w-5 h-5"></i> Simpan Semua Libur
                        </button>
                    </div>
                </div>
            </div>

            <!-- Recap Table Section -->
            <div id="rekapContainer" class="glass-card p-8">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <h2 id="rekapTitle" class="text-2xl font-bold text-white">Rekapitulasi Kehadiran</h2>
                    <button id="exportBtn" class="premium-btn !w-auto px-8 hidden">
                        <i data-lucide="download" class="w-5 h-5"></i> Ekspor Excel
                    </button>
                </div>
                
                <div id="rekapLoader" class="text-center py-20 bg-slate-950/20 rounded-2xl border border-dashed border-white/10">
                    <i data-lucide="calendar" class="w-12 h-12 text-gray-700 mx-auto mb-4"></i>
                    <p class="text-gray-500">Silakan pilih bulan dan tahun lalu terapkan filter.</p>
                </div>
                
                <div id="rekapTableWrapper" class="overflow-x-auto min-h-[400px]"></div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">
        <p id="toastMessage"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/panel-admin-pembimbing.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
