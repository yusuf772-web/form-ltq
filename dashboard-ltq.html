<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin LTQ - Dashboard</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Admin LTQ">
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="manifest.json" onerror="this.onerror=null;this.href='data:application/json;base64,e30='">
    <link rel="apple-touch-icon" href="https://www.hidayatunnajah.or.id/wp-content/uploads/2025/07/WhatsApp-Image-2025-07-19-at-16.30.33.jpeg">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <!-- Brand -->
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <i data-lucide="layout-grid" class="text-white"></i>

            <div>
                <div class="sidebar-title">Admin LTQ</div>
                <div class="sidebar-subtitle">Hidayatunnajah</div>
            </div>
        </div>

        <nav class="sidebar-nav custom-scrollbar">
            <div class="sidebar-section-label">Menu Utama</div>

            <a href="#" id="link-halaqoh" class="sidebar-link top-menu-link active" data-src="panel-admin-santri.html">
                <i data-lucide="clipboard-list" class="sidebar-link-icon"></i>
                <span>Submisi Formulir</span>
            </a>

            <a href="#" id="link-kehadiran" class="sidebar-link top-menu-link" data-src="absensi-pembimbing.html">
                <i data-lucide="calendar-check" class="sidebar-link-icon"></i>

            </a>

            <a href="#" id="link-rekap-pembimbing" class="sidebar-link top-menu-link" data-src="panel-admin-pembimbing.html">
                <i data-lucide="file-text" class="sidebar-link-icon"></i>
                <span>Rekap Pembimbing</span>
            </a>

            <a href="#" id="link-rekap-santri" class="sidebar-link top-menu-link" data-src="rekapitulasi-santri.html">
                <i data-lucide="bar-chart-2" class="sidebar-link-icon"></i>
                <span>Rekap Santri</span>
            </a>

            <div class="sidebar-section-label">Master Data</div>

            <a href="#" id="link-settings-halaqoh" class="sidebar-link top-menu-link" data-src="seting-halaqoh.html">
                <i data-lucide="settings-2" class="sidebar-link-icon"></i>
                <span>Seting Halaqoh</span>
            </a>

            <a href="#" id="link-import" class="sidebar-link top-menu-link" data-src="impor-data-massal.html">
                <i data-lucide="upload" class="sidebar-link-icon"></i>
                <span>Import Data Massal</span>
            </a>
        </nav>

        <!-- Footer -->
        <div class="sidebar-footer">
            <div class="sidebar-footer-badge">
                <div class="bg-blue-500/20 p-2 rounded-lg">
                    <i data-lucide="shield-check" class="w-4 h-4 text-blue-400"></i>
                </div>
                <div>
                    <strong>LTQ Admin</strong>
                    <span>Panel Pengelola</span>
                </div>
            </div>
        </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-area">

        <div class="mobile-topbar">
            <button class="mobile-menu-btn" id="mobile-menu-button">
                <i data-lucide="menu"></i>
            </button>
            <h1>Admin LTQ</h1>
            <div class="w-10"></div>
        </div>

        <!-- Content -->
        <div class="content-main">
            <div id="loader">
                <div class="loader-inner">
                    <div class="w-12 h-12 border-t-2 border-b-2 border-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                    <p>Memuat Sistem...</p>
                </div>
            </div>
            <iframe id="content-frame" allowfullscreen allow="clipboard-write"></iframe>

    <script src="js/dashboard.js"></script>
    <script>lucide.createIcons();</script>
