<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekapitulasi Santri - Admin LTQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/rekapitulasi-santri.css">
    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-iframe');
            window.addEventListener('DOMContentLoaded', () => document.body.classList.add('is-iframe'));
        }
    </script>
</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
            <div class="header-icon">
                <i data-lucide="bar-chart-2" class="w-10 h-10 text-white"></i>
            </div>
            <div class="flex-1 flex justify-between items-center">
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight text-white">Rekapitulasi Santri</h1>
                    <p class="text-gray-400 text-lg">Lihat, pantau, dan ekspor data rekapitulasi santri secara periodik.</p>
                </div>
                <button id="exportBtn" class="premium-btn !w-auto px-8 hidden" disabled>
                    <i data-lucide="download" class="w-5 h-5"></i> Ekspor Excel
                </button>
            </div>
        </header>

        <main class="space-y-8">
            <!-- Filters -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass-card p-6">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 block">Metode Filter</label>
                    <div id="filterTypeContainer" class="tab-nav-premium">
                        <button data-value="month" class="filter-btn active">Per Bulan</button>
                        <button data-value="range" class="filter-btn">Rentang</button>
                    </div>
                </div>

                <div class="glass-card p-6 lg:col-span-2">
                    <label id="dateFilterLabel" class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 block">Pilih Periode</label>
                    <div class="flex flex-col sm:flex-row gap-4">
                        <select id="monthFilter" class="input-glass"></select>
                        <input type="date" id="startDateFilter" class="input-glass hidden">
                        <input type="date" id="endDateFilter" class="input-glass hidden">
                    </div>
                </div>
            </div>

            <!-- Tabs & Class Filter -->
            <div class="glass-card p-8">
                <div class="flex flex-col gap-8">
                    <div class="flex">
                        <div id="recapFilterContainer" class="tab-nav-premium w-full sm:w-auto">
                            <button data-recap="perkembangan" class="tab-btn active">Perkembangan</button>
                            <button data-recap="tasmi" class="tab-btn">Tasmi'</button>
                            <button data-recap="absen" class="tab-btn">Absen</button>
                            <button data-recap="nilai" class="tab-btn">Nilai</button>
                        </div>
                    </div>
                    <div class="flex flex-col gap-4">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">Filter Kelas:</p>
                        <div id="classFilterContainer" class="filter-chip-container">
                            <!-- JS injected -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="glass-card p-6 min-h-[500px]">
                <div id="rekapLoader" class="hidden py-20 text-center">
                    <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                    <p class="text-gray-400">Memproses data laporan...</p>
                </div>

                <div class="overflow-x-auto">
                    <table id="rekapTable" class="rekap-table hidden">
                        <thead id="rekapTableHead"></thead>
                        <tbody id="rekapTableBody"></tbody>
                    </table>
                </div>

                <div id="emptyState" class="py-24 text-center">
                    <div class="w-20 h-20 bg-slate-900/50 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-700">
                        <i data-lucide="database" class="w-10 h-10"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">Belum Ada Data</h3>
                    <p class="text-gray-500 max-w-sm mx-auto">Silakan pilih kelas dan periode filter untuk menampilkan laporan rekapitulasi.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">
        <p id="toastMessage"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/rekapitulasi-santri.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
