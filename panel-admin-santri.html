<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submisi Formulir - Admin LTQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/panel-admin-santri.css">
    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-iframe');
            window.addEventListener('DOMContentLoaded', () => document.body.classList.add('is-iframe'));
        }
    </script>
</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
            <div class="header-icon">
                <i data-lucide="clipboard-list" class="w-10 h-10 text-white"></i>
            </div>
            <div class="flex-1">
                <h1 class="text-4xl font-extrabold tracking-tight text-white">Submisi Formulir</h1>
                <p class="text-gray-400 text-lg">Pantau dan kelola data submisi formulir harian secara real-time.</p>
            </div>
        </header>

        <main class="w-full">
            <div class="glass-card p-6">
                <!-- Filters & Actions -->
                <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-8 gap-4">
                    <h2 class="text-2xl font-bold text-white">Data Terbaru</h2>
                    <div class="flex flex-wrap gap-2">
                        <select id="submissionMonthFilter" class="input-glass text-xs w-32"></select>
                        <select id="formTypeFilter" class="input-glass text-xs w-40">
                            <option value="">Semua Form</option>
                            <option value="form1">Perkembangan</option>
                            <option value="form2">Tasmi'</option>
                            <option value="form3">Absen</option>
                        </select>
                        <select id="itemsPerPageSelect" class="input-glass text-xs w-28">
                            <option value="10">10 / hal</option>
                            <option value="25">25 / hal</option>
                            <option value="50">50 / hal</option>
                        </select>
                    </div>
                </div>

                <div class="mb-8 relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                    <input type="text" id="submissionSearchInput" placeholder="Cari santri atau pembimbing..." class="input-glass pl-10">
                </div>

                <!-- Table Content -->
                <div id="adminDataTableWrapper" class="overflow-x-auto min-h-[400px]">
                    <div id="adminDataTableLoader" class="p-12 text-center">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                        <p class="text-gray-400">Memuat data...</p>
                    </div>
                    <div id="adminDataTable"></div>
                </div>

                <!-- Pagination -->
                <div id="paginationControls" class="hidden mt-8 flex items-center justify-between pt-6 border-t border-white/5">
                    <span id="paginationInfo" class="text-sm text-gray-400"></span>
                    <div class="flex items-center gap-3">
                        <button id="prevPageBtn" class="btn-secondary-glass !py-2 !px-4 text-sm">Prev</button>
                        <div id="pageNumbers" class="flex gap-2"></div>
                        <button id="nextPageBtn" class="btn-secondary-glass !py-2 !px-4 text-sm">Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="editSubmissionModal" class="modal-overlay">
        <div class="glass-card p-8 modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-white">Edit Data Submisi</h3>
                <button class="icon-btn close-modal"><i data-lucide="x"></i></button>
            </div>
            <input type="hidden" id="editSubmissionId">
            <div id="edit-submission-body" class="space-y-6 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar">
                <div class="form-group">
                    <label>Nama Santri</label>
                    <input type="text" id="edit-common-namaSantri" class="input-glass" disabled>
                </div>

                <div id="edit-form1-fields" class="hidden space-y-6">
                    <div class="form-group">
                        <label>Total Hafalan</label>
                        <input type="text" id="edit-f1-totalHafalan1" class="input-glass">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label>Nilai Itqon</label>
                            <input type="number" id="edit-f1-nilaiItqon1" step="0.1" class="input-glass">
                        </div>
                        <div class="form-group">
                            <label>Nilai Tajwid</label>
                            <input type="number" id="edit-f1-nilaiTajwid1" step="0.1" class="input-glass">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Catatan</label>
                        <textarea id="edit-f1-catatanPerkembangan1" class="input-glass h-32 resize-none"></textarea>
                    </div>
                </div>

                <div id="edit-form2-fields" class="hidden space-y-6">
                    <div class="form-group">
                        <label>Pembimbing Menyimak</label>
                        <select id="edit-f2-namaPembimbingMenyimak" class="input-glass"></select>
                    </div>
                    <div class="form-group">
                        <label>Jumlah Juz</label>
                        <input type="text" id="edit-f2-jumlahHafalanTasmi" class="input-glass">
                    </div>
                    <div class="form-group">
                        <label>Keterangan</label>
                        <select id="edit-f2-keteranganTasmi" class="input-glass">
                            <option value="sangat_kurang">Sangat Kurang</option>
                            <option value="kurang">Kurang</option>
                            <option value="bagus">Bagus</option>
                            <option value="bagus_sekali">Bagus Sekali</option>
                            <option value="sempurna">Sempurna</option>
                        </select>
                    </div>
                </div>

                <div id="edit-form3-fields" class="hidden space-y-6">
                    <div class="form-group">
                        <label class="mb-4 block">Status Kehadiran</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-white/5 cursor-pointer hover:border-blue-500/50 transition-all">
                                <input type="radio" name="edit-f3-kehadiranHalaqoh" value="hadir" class="w-4 h-4 text-blue-500">
                                <span class="font-medium">Hadir</span>
                            </label>
                            <label class="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-white/5 cursor-pointer hover:border-blue-500/50 transition-all">
                                <input type="radio" name="edit-f3-kehadiranHalaqoh" value="alpha" class="w-4 h-4 text-red-500">
                                <span class="font-medium">Alpha</span>
                            </label>
                            <label class="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-white/5 cursor-pointer hover:border-blue-500/50 transition-all">
                                <input type="radio" name="edit-f3-kehadiranHalaqoh" value="sakit" class="w-4 h-4 text-yellow-500">
                                <span class="font-medium">Sakit</span>
                            </label>
                            <label class="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-white/5 cursor-pointer hover:border-blue-500/50 transition-all">
                                <input type="radio" name="edit-f3-kehadiranHalaqoh" value="izin" class="w-4 h-4 text-blue-400">
                                <span class="font-medium">Izin</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Keterangan Tambahan</label>
                        <input type="text" id="edit-f3-keteranganTambahan" class="input-glass">
                    </div>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button id="cancelEditSubmissionBtn" class="btn-secondary-glass flex-1">Batal</button>
                <button id="saveEditSubmissionBtn" class="premium-btn flex-1">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="glass-card p-8 modal-content max-w-sm text-center">
            <div class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                <i data-lucide="alert-triangle" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Hapus Submisi?</h3>
            <p class="text-gray-400 mb-6">Data yang dihapus tidak dapat dikembalikan.</p>
            <div class="flex gap-3">
                <button id="cancelDeleteBtn" class="btn-secondary-glass flex-1">Batal</button>
                <button id="confirmDeleteBtn" class="premium-btn !bg-red-600 flex-1">Hapus</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <p id="toastMessage"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/panel-admin-santri.js"></script>
    <script>
        lucide.createIcons();
        
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.onclick = () => btn.closest('.modal-overlay').classList.remove('show');
        });
    </script>
</body>

</html>
